<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Verification submitted · Loopii</title>
<style>
  :root { --purple: #7C3AED; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #FBFAFF;
    color: #1F2937;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.08);
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
  }
  .seal {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #EEEDFE;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
  }
  .seal svg { width: 40px; height: 40px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
  p { font-size: 14px; line-height: 1.6; color: #6B7280; }
  .divider { height: 1px; background: rgba(0,0,0,0.07); margin: 20px 0; }
  .zh h1 { font-size: 19px; }
  .brand { margin-top: 24px; font-size: 12px; color: #9CA3AF; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="card">
    <div class="seal" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 12.5 l4 4 L19 7" stroke="#7C3AED" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Verification submitted</h1>
    <p>Thanks &mdash; your verification has been submitted. You can close this page and return to the Loopii app. Your verified badge will appear once it&rsquo;s approved.</p>
    <div class="divider"></div>
    <div class="zh">
      <h1>验证已提交</h1>
      <p>感谢 &mdash; 你的验证已提交。请关闭此页面,返回 Loopii App。审核通过后,认证勋章会自动出现。</p>
    </div>
    <div class="brand">LOOPII</div>
  </div>
</body>
</html>
